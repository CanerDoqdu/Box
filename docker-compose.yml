services:
  box:
    build:
      context: .
      dockerfile: docker/orchestrator/Dockerfile
    working_dir: /workspace
    env_file:
      - .env
    volumes:
      - ./:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    command: ["sh", "-c", "npm install && npm run box:start"]
    restart: unless-stopped
